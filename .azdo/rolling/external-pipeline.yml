# This pipeline runs the external (public/open-source, microsoftInternal=0) validation
# of BuildXL as a standalone pipeline. It is triggered by the rolling pipeline via
# the schedule-build-in-ado.yml mechanism.
#
# All version information is passed as parameters by the rolling pipeline.

trigger: none  # Only triggered by the rolling pipeline

# Set the ADO build number to match the rolling pipeline's build number.
# This is critical because $(Build.BuildNumber) is used in package names and filters.
name: $(RollingBuildNumber)

parameters:
- name: Branding_SemanticVersion
  displayName: Semantic version (e.g., 0.1.0)
  type: string
  default: '0.1.0'
- name: Branding_PrereleaseTag
  displayName: Pre-release tag (e.g., 20250326.1)
  type: string
  default: ''
- name: RollingBuildNumber
  displayName: Rolling pipeline build number (leave 'auto' for manual runs)
  type: string
  default: 'auto'
- name: RollingBuildId
  displayName: Rolling pipeline build ID (leave 'auto' for manual runs)
  type: string
  default: 'auto'

variables:
- group: "BuildXL Common variables"
- template: variables.yml
# These variables support two trigger modes:
# 1. Manual runs: values come from parameters (shown in ADO "Run pipeline" UI)
# 2. API-triggered runs (schedule-build-in-ado.yml): values come as runtime variables
#    via queueTimeVars, which are set AFTER compile-time parameter resolution.
# We define from parameters (compile-time), but the API-set runtime variables with
# the same names will override them at runtime.
- name: Branding_SemanticVersion
  value: ${{ parameters.Branding_SemanticVersion }}
- name: Branding_PrereleaseTag
  value: ${{ parameters.Branding_PrereleaseTag }}
- name: RollingBuildNumber
  ${{ if eq(parameters.RollingBuildNumber, 'auto') }}:
    value: ${{ parameters.Branding_SemanticVersion }}-${{ parameters.Branding_PrereleaseTag }}
  ${{ else }}:
    value: ${{ parameters.RollingBuildNumber }}
- name: RollingBuildId
  ${{ if eq(parameters.RollingBuildId, 'auto') }}:
    value: $(Build.BuildId)
  ${{ else }}:
    value: ${{ parameters.RollingBuildId }}
# Map to the names the external.yml jobs expect
- name: BuildXL.SemanticVersion
  value: $(Branding_SemanticVersion)
- name: BuildXL.PreReleaseTag
  value: $(Branding_PrereleaseTag)

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: BuildXL-DevOpsAgents-Selfhost-BuildCache
      os: windows
      image: 1ESPT-Win2022-PME-3
    featureFlags:
      autoBaseline: false
      incrementalSDLBinaryAnalysis: true
    sdl:
      sourceAnalysisPool:
        name: Windows-SDL-Agents
        os: windows
      spotBugs:
        enabled: false
      baseline:
        baselineFile: $(Build.SourcesDirectory)\.config\guardian\.gdnbaselines
      codeql:
        compiled:
          enabled: false
          justificationForDisabling: 'CodeQL would not be effective on this pipeline because builds are incremental. We will create a separate clean build pipeline for CodeQL.'
      binskim:
        enabled: true
        scanOutputDirectoryOnly: true
        preReleaseVersion: '4.3.1'
    stages:
    - stage: External
      displayName: Build and validate external bits
      jobs:
      - template: /.azdo/rolling/jobs/external.yml@self
        parameters:
          useDropsForArtifacts: true
          RollingBuildNumber: $(RollingBuildNumber)
          RollingBuildId: $(RollingBuildId)
