# This pipeline runs a full BuildXL selfhost build on every commit to main.
# Its only purpose is to populate the shared dev cache so that developer builds
# (which consume the cache in read-only DevCache mode) get cache hits.
# The pipeline succeeds even if the build fails — a failed build still populates
# the cache for the pips that did complete.
# A dev build is simulated at the end to verify that we can get cache hits with the published cache.

trigger:
  branches:
    include:
    - main

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

variables:
- group: "BuildXL Common variables"

extends:
  template: v1/1ES.Unofficial.PipelineTemplate.yml@1esPipelines
  parameters:
    sdl:
      sourceAnalysisPool:
        name: Windows-SDL-Agents
        os: windows
      codeql:
        compiled:
          enabled: false
          justificationForDisabling: 'This pipeline only populates the dev cache. CodeQL runs in a dedicated pipeline.'

    pool:
      name: BuildXLDevCachePublisher
      os: windows

    stages:
    - stage: Build
      displayName: Populate Dev Cache
      jobs:
      - job: FullBuild
        displayName: Full selfhost internal build (dev cache publishing + validation)
        timeoutInMinutes: 180
        continueOnError: true
        templateContext:
          workflow: BuildXL
          cache:
            logGeneratedConfiguration: true

          preBuildSteps:
          - checkout: self
          - template: /.azdo/common/journaling.yml@self
          - template: /.azdo/common/set-variable-pats.yml@self
          - template: /.azdo/common/install-credential-provider.yml@self

          buildXL:
            arguments: >-
              /unsafe_GlobalPassthroughEnvVars:NUGET_CREDENTIALPROVIDERS_PATH;VSS_NUGET_EXTERNAL_FEED_ENDPOINTS
              /unsafe_GlobalUntrackedScopes:$(NugetCredentialProviderPath);C:\ProgramData\Microsoft\NetFramework\BreadcrumbStore
              /config:config.dsc
              /p:[Sdk.BuildXL]useQTest=true
              /p:[Sdk.BuildXL]microsoftInternal=1
              /environment:SelfHostPrivateBuild
              /q:DebugNet9
              /q:ReleaseNet9
              /runInSubst
              /server-
              /enableLazyOutputs:minimal
              /p:[Sdk.BuildXL]useManagedSharedCompilation=1
            env:
              1ESSHAREDASSETS_BUILDXL_FEED_PAT: $(1ESSHAREDASSETS_BUILDXL_FEED_PAT)
              CLOUDBUILD_BUILDXL_SELFHOST_FEED_PAT: $(CLOUDBUILD_BUILDXL_SELFHOST_FEED_PAT)
              ARTIFACT_CREDENTIALPROVIDERS_PATH: $(ARTIFACT_CREDENTIALPROVIDERS_PATH)
              CLOUDBUILD_BUILDXL_SELFHOST_FEED_PAT_B64: $(CLOUDBUILD_BUILDXL_SELFHOST_FEED_PAT_B64)
              VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: $(VSS_NUGET_EXTERNAL_FEED_ENDPOINTS)
              NUGET_CREDENTIALPROVIDERS_PATH: $(NugetCredentialProviderPath)
            workingDirectory: $(Build.Repository.LocalPath)

          postBuildSteps:
          # Clear the local cache from the previous build, so we can simulate a developer build that only gets cache hits from the shared dev cache
          - task: CmdLine@2
            displayName: Clear local cache
            condition: always()
            inputs:
              script: |
                set "CACHE_DIR=$(Build.Repository.LocalPath)\Out\Cache"
                echo Clearing local cache at: %CACHE_DIR%
                if exist "%CACHE_DIR%" (
                  echo Removing contents...
                  rmdir /s /q "%CACHE_DIR%"
                  echo Local cache removed.
                ) else (
                  echo No local cache directory found, nothing to delete.
                )

          # We want to simulate a dev build and verify whether we get remote cache hits. 
          # Let's use the same engine than the feeding build used. There is a pipeline variable ONEES_TOOL_LOCATION_<tool>_<sanitized_version>_<os> set by the tool installer,
          # but that is not a stable name and is not practical to try to deduce it here. Let's just glob hostedtoolcache\windows\BuildXL*\* to
          # find the installed engine (there should be just one).
          # Copy the engine to the Dev directory, and reference it via -Use Dev
          - task: CmdLine@2
            displayName: Copy just used engine to Dev directory
            condition: always()
            inputs:
              script: |
                set "DST_DIR=$(Build.Repository.LocalPath)\Out\Selfhost\Dev"
                echo Looking for BuildXL engine in hostedtoolcache...
                set "SRC_DIR="
                for /d %%d in (C:\hostedtoolcache\windows\BuildXL*) do (
                  for /d %%v in ("%%d\*") do set "SRC_DIR=%%v"
                )
                if not defined SRC_DIR (
                  echo ERROR: Could not find BuildXL engine in hostedtoolcache
                  exit /b 1
                )
                echo Copying engine from: %SRC_DIR%
                echo                  to: %DST_DIR%
                robocopy "%SRC_DIR%" "%DST_DIR%" /E /NP /NFL /NDL /NJH /NJS
                set RC=%ERRORLEVEL%
                echo Robocopy exit code: %RC%
                if %RC% LEQ 7 (exit /b 0) else (exit /b 1)

          - task: microsoft-1es-production.entra-authenticate.entra-authenticate.EntraAuthenticate@0
            displayName: '🪙 Acquire access token for mseng-Domino-BuildXL-Pipelines'
            condition: always()
            inputs:
              azureSubscription: 'mseng-Domino-BuildXL-Pipelines'
              resource: 'https://management.azure.com/'
              secretVariable: 'DevCacheEntraToken'

          # Simulate a dev build (minimal) and verify whether we get remote cache hits.
          # Explicitly disable using the ADO build runner and turn on DevCache mode.
          # Pass the acquired Entra token to avoid interactive authentication.
          # Simulate the cache miss key the ADO runner passes on the above step, so we can get a meaningful cache miss analysis.
          - task: CmdLine@2
            displayName: Simulate dev build (DevCache mode)
            condition: always()
            inputs:
              script: >-
                call
                bxl.cmd
                -Use Dev
                -DisableAdoBuildRunner
                -SharedCacheMode DevCache
                -DeveloperBuildCacheEntraTokenEnvVarName DEVCACHE_ENTRA_TOKEN
                -Minimal
                -LogGeneratedCacheConfigFile
                /p:[Sdk.BuildXL]microsoftInternal=1
                /p:[Sdk.BuildXL]useManagedSharedCompilation=1
                /cacheMiss:$(System.StageName)_$(System.PhaseName)
                /logsDirectory:$(Build.Repository.LocalPath)\Out\Logs\DevCacheValidation
            env:
              DEVCACHE_ENTRA_TOKEN: $(DevCacheEntraToken)
              1ESSHAREDASSETS_BUILDXL_FEED_PAT: $(1ESSHAREDASSETS_BUILDXL_FEED_PAT)
              CLOUDBUILD_BUILDXL_SELFHOST_FEED_PAT: $(CLOUDBUILD_BUILDXL_SELFHOST_FEED_PAT)
              ARTIFACT_CREDENTIALPROVIDERS_PATH: $(ARTIFACT_CREDENTIALPROVIDERS_PATH)
              CLOUDBUILD_BUILDXL_SELFHOST_FEED_PAT_B64: $(CLOUDBUILD_BUILDXL_SELFHOST_FEED_PAT_B64)
              VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: $(VSS_NUGET_EXTERNAL_FEED_ENDPOINTS)
              NUGET_CREDENTIALPROVIDERS_PATH: $(NugetCredentialProviderPath)

          - task: 1ES.PublishPipelineArtifact@1
            displayName: Upload DevCache validation logs
            condition: always()
            continueOnError: true
            inputs:
              targetPath: $(Build.Repository.LocalPath)\Out\Logs\DevCacheValidation
              artifactName: DevCache Validation logs

          # Read the resulting stats file and check whether the cache hit rate is above 70%.
          # 70% is an arbitrary threshold. The idea is to detect if something fundamental is broken.
          - task: PowerShell@2
            displayName: Dev cache hit rate >= 70%
            condition: always()
            inputs:
             targetType: inline
             script: |
               $statsFile = "$(Build.Repository.LocalPath)\Out\Logs\DevCacheValidation\BuildXL.stats"
               if (-not (Test-Path $statsFile)) {
                   Write-Host "##vso[task.logissue type=warning]Stats file not found at $statsFile. Cannot validate cache hit rate."
                   Write-Host "##vso[task.complete result=SucceededWithIssues;]"
                   exit 0
               }

               $stats = @{}
               Get-Content $statsFile | ForEach-Object {
                   if ($_ -match '^(.+?)=(.+)$') {
                       $stats[$Matches[1]] = [long]$Matches[2]
                   }
               }

               $hits = $stats['ProcessPipCacheHits']
               $total = $stats['TotalProcessPips']

               if ($null -eq $total -or $total -eq 0) {
                   Write-Host "##vso[task.logissue type=warning]TotalProcessPips is 0 or not found. Cannot compute cache hit rate."
                   Write-Host "##vso[task.complete result=SucceededWithIssues;]"
                   exit 0
               }

               $rate = [math]::Round(($hits / $total) * 100, 2)
               Write-Host "Cache hit rate: $rate% ($hits hits / $total total process pips)"

               if ($rate -lt 70) {
                   Write-Host "##vso[task.logissue type=warning]Cache hit rate $rate% is below the 70% threshold. All hits are assumed remote (local cache was cleared)."
                   Write-Host "##vso[task.complete result=SucceededWithIssues;]"
               } else {
                   Write-Host "Cache hit rate $rate% meets the >= 70% threshold."
               }