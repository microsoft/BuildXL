trigger: none

variables:
# Add CG exclusions
- template: /.azdo/common/component-detection-exclusions.yml

  # Explicitly scheduled for PRs

# [CODESYNC: .azdo/linux/run-on-ubuntu-2404.yml, .azdo/linux/run-on-azure-linux-3.yml]
# 1ES Pipeline Templates validation requires 'resources' to be declared in the top-level
# pipeline YAML, not in an intermediate template. This block must be duplicated in each
# pipeline that extends pipeline_base.yml.
resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: /.azdo/linux/pipeline_base.yml@self
  parameters:
    image: ubuntu-22.04-PME-GPT
    # We keep using interpose for Ubuntu 22.04 as test coverage until we can retire the interpose sandbox.
    BxlExtraArgs: /p:BUILDXL_FINGERPRINT_SALT=Ubuntu2204 /enableLinuxEBPFSandbox-
