# Installs the Visual C++ Redistributable (2015-2022) if it is not already present.
# Some base images do not ship with the VC++ runtime, which is required by native
# components like BuildXLAria.dll.
steps:
- task: PowerShell@2
  displayName: Install Visual C++ Redistributable
  inputs:
    targetType: inline
    script: |
      if (Test-Path 'C:\Windows\System32\vcruntime140.dll') {
        Write-Host "VC++ Redistributable already installed."
        return
      }
      Write-Host "Downloading VC++ Redistributable..."
      $installer = Join-Path $env:TEMP 'vc_redist.x64.exe'
      Invoke-WebRequest -Uri 'https://aka.ms/vs/17/release/vc_redist.x64.exe' -OutFile $installer
      Write-Host "Installing..."
      Start-Process -FilePath $installer -ArgumentList '/install', '/quiet', '/norestart' -Wait
      Write-Host "VC++ Redistributable installed."
