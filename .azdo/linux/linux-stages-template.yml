parameters:
# Do not use this parameter, and rather BxlExtraArgs below to append extra arguments.
# This parameter is used as a constant to define arguments for all Linux builds below.
- name: BxlCommonArgs
  type: string
  default: >-
    /logObservedFileAccesses 
    /logoutput:FullOutputOnError 
    /p:[Sdk.BuildXL]xunitSemaphoreCount=8 
    /forceAddExecutionPermission-

- name: BxlExtraArgs
  type: string
  default: ''

- name: pool
  type: object

# Suffix appended to stage names to make them unique when this template
# is invoked multiple times in the same pipeline (e.g., _Ubuntu2204, _AzureLinux3).
- name: suffix
  type: string
  default: ''

# Human-readable prefix shown in display names (e.g., '[Ub22.04] ').
# Include the trailing space in the value itself.
- name: displayPrefix
  type: string
  default: ''

# TODO: Remove the 'bootstrap' parameter once the entry point pipeline is run-linux-pr.yml.
- name: bootstrap
  type: boolean
  default: true

- name: sdkVersion
  type: string
  default: '9.x'

# Pre-build steps, including downloading BuildXL if needed
- name: preBuildSteps
  type: stepList
  default: []

stages:
# TODO: Remove this step and the 'bootstrap' parameter once the entry point pipeline is run-linux-pr.yml.
# Bootstrap runs on Ubuntu 22.04, producing an engine consumed by validation stages.
# This mirrors the rolling build, which also bootstraps on 22.04 to produce
# glibc-compatible binaries for all supported distros.
# The eBPF sandbox is compiled natively since all supported platforms have kernel 6.6+.
- ${{ if parameters.bootstrap }}:
  - stage: Bootstrap_Internal
    displayName: Bootstrap engine
    dependsOn: []
    jobs:
    - template: /.azdo/linux/jobs/job-bootstrap.yml@self
      parameters:
        BxlCommonArgs: --shared-comp ${{ parameters.BxlCommonArgs }}
        pool:
          name: BuildXL-DevOpsAgents-Selfhost-BuildCache
          image: ubuntu-22.04-PME-GPT
          os: linux
        sdkVersion: ${{ parameters.sdkVersion }}

- stage: Build_External${{ parameters.suffix }}
  displayName: ${{ parameters.displayPrefix }}External validation
  dependsOn: []
  jobs:
  - template: /.azdo/linux/jobs/job-external.yml@self
    parameters:
      BxlCommonArgs: --shared-comp ${{ parameters.BxlCommonArgs }} ${{ parameters.BxlExtraArgs }}
      pool: ${{ parameters.pool }}
      sdkVersion: ${{ parameters.sdkVersion }}
      suffix: ${{ parameters.suffix }}

- stage: Build_Internal${{ parameters.suffix }}
  displayName: ${{ parameters.displayPrefix }}Internal validation
  dependsOn: Bootstrap_Internal
  jobs:
  - template: /.azdo/linux/jobs/job-selfhost.yml@self
    parameters:
      BxlCommonArgs: --shared-comp ${{ parameters.BxlCommonArgs }} ${{ parameters.BxlExtraArgs }}
      pool: ${{ parameters.pool }}
      sdkVersion: ${{ parameters.sdkVersion }}
      preBuildSteps:
      - ${{ each step in parameters.preBuildSteps }}:
        - ${{ step }}

- stage: Verify_PTrace${{ parameters.suffix }}
  displayName: ${{ parameters.displayPrefix }}PTrace validation
  dependsOn: Bootstrap_Internal
  jobs:
  - template: /.azdo/linux/jobs/job-ptrace.yml@self
    parameters:
      BxlCommonArgs: ${{ parameters.BxlCommonArgs }} ${{ parameters.BxlExtraArgs }}
      pool: ${{ parameters.pool }}
      sdkVersion: ${{ parameters.sdkVersion }}

- stage: Build_Distributed${{ parameters.suffix }}
  displayName: ${{ parameters.displayPrefix }}Distributed test
  dependsOn:
  - Build_Internal${{ parameters.suffix }}
  - Verify_PTrace${{ parameters.suffix }}
  jobs:
  - template: /.azdo/linux/jobs/job-distributed-1espt.yml@self
    parameters:
      pool:
        # This stage expects a pool with a build cache configured, so hardcoding that one
        ${{ each kvp in parameters.pool }}:
          ${{ if not(in(kvp.key, 'name')) }}:
            ${{ kvp.key }}: ${{ kvp.value }}
        name: BuildXL-DevOpsAgents-Selfhost-BuildCache
      preBuildSteps:
      - ${{ each step in parameters.preBuildSteps }}:
        - ${{ step }}