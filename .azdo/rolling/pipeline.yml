parameters:
# If this parameter is false, publishing is skipped
# and the release pipeline won't be triggered
# CODESYNC: Don't remove or rename this parameter without first updating 
#           the 1ESPT pipeline that is queuing a build and passing it.
- name: triggerReleasePipeline
  type: boolean
  default: true

trigger:
  branches:
    include:
    - main
  paths:
    exclude:
    - Documentation
    - Examples
  
variables:
- group: "BuildXL Common variables"
- template: variables.yml
- name: isPublishingBranch
  # We only want to run the publishing stage for main and releases/* branch
  # This condition is to avoid publishing binaries from test runs of the pipeline from custom branches
  value: $[ or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/heads/releases')) ]
- ${{ if startsWith(variables['Build.SourceBranch'], 'refs/heads/releases') }}:
  # Infer a pre-release tag if the branch is a releases/* branch (patch) and the variable has not been defined.
  # We assume the branch is named 'releases/0.1.0-*******', as per our patch instructions.
  - name: InferredPreReleaseTag
    value: $[ replace(replace(variables['Build.SourceBranch'], 'refs/heads/releases/', ''), '0.1.0-', '') ]

resources:
  repositories:
  - repository: DominoReleaseManagement
    type: git
    name: Domino.ReleaseManagement
    ref: master
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: BuildXL-DevOpsAgents-Selfhost-BuildCache
      os: windows
      image: 1ESPT-Win2022-PME-3
    settings:
      networkIsolationPolicy: Permissive,CFSClean,CFSClean2,CFSClean3
    featureFlags:
      autoBaseline: false
      incrementalSDLBinaryAnalysis: true
    sdl:
      componentgovernance:
        # CODESYNC: .azdo/common/component-detection-exclusions.yml
        ignoreDirectories: 'Out/frontend/Download,Out/NodeJsForUnitTests'
      sourceAnalysisPool:
        name: Windows-SDL-Agents
        os: windows
      spotBugs:
        enabled: false
      baseline:
        baselineFile: $(Build.SourcesDirectory)\.config\guardian\.gdnbaselines
      codeql:
        compiled:
          enabled: false
          justificationForDisabling: 'CodeQL would not be effective on this pipeline because builds are incremental. We will create a separate clean build pipeline for CodeQL.'
      binskim:
        enabled: true
        scanOutputDirectoryOnly: true
        preReleaseVersion: '4.3.1'
    stages:
    - stage: prepare
      displayName: Set build number
      dependsOn: []
      jobs:
      - template: .azdo/rolling/jobs/set-build-number.yml@self

    - stage: CB
      displayName: CB Validation
      dependsOn: prepare
      jobs:
      - template: .azdo/rolling/jobs/cb.yml@self

    - stage: RCIT
      displayName: RunCheckInTests
      dependsOn: prepare
      jobs:
      - template: .azdo/rolling/jobs/run-checkin-tests.yml@self

    - stage: Linux
      displayName: Linux
      dependsOn: prepare
      jobs:
      - template: .azdo/rolling/jobs/linux.yml@self

    - stage: TriggerExternal
      displayName: Trigger External Validation Pipeline
      dependsOn: prepare
      variables:
        BuildXL.SemanticVersion: $[ stageDependencies.prepare.SetBuildNumber.outputs['SetBuildNumber.BuildXLSemanticVersion'] ]
        BuildXL.PreReleaseTag: $[ stageDependencies.prepare.SetBuildNumber.outputs['SetBuildNumber.BuildXLPreReleaseTag'] ]
      jobs:
      - job: TriggerExternalPipeline
        displayName: Trigger and wait for External Validation
        timeoutInMinutes: 240
        pool:
          name: BuildXL-DevOpsAgents-Selfhost-BuildCache
          os: windows
          image: 1ESPT-Win2022-PME-3
        steps:
        - checkout: none
        - template: /pipelines/common/generate-access-token.yml@DominoReleaseManagement
          parameters:
            accessTokenVariable: 'BuildXLPipelinesAccessToken'
            resource: '499b84ac-1321-427f-aa17-267ca6975798'
            serviceConnection: 'mseng-Domino-BuildXL-Pipelines'
        - task: PowerShell@2
          displayName: Trigger and wait for External Validation
          inputs:
            targetType: inline
            script: |
              $ErrorActionPreference = "Stop"
              $pipelineId = 22402
              $org = "mseng"
              $project = "Domino"
              $apiVersion = "7.1-preview.1"
              $token = $env:BUILDXL_PIPELINES_PAT
              $headers = @{
                Authorization = "Bearer $token"
                "Content-Type" = "application/json"
              }

              # Trigger the external validation pipeline using template parameters
              $body = @{
                resources = @{
                  repositories = @{
                    self = @{
                      refName = "$(Build.SourceBranch)"
                      version = "$(Build.SourceVersion)"
                    }
                  }
                }
                templateParameters = @{
                  Branding_SemanticVersion = "$(BuildXL.SemanticVersion)"
                  Branding_PrereleaseTag = "$(BuildXL.PreReleaseTag)"
                  RollingBuildNumber = "$(Build.BuildNumber)"
                  RollingBuildId = "$(Build.BuildId)"
                }
              } | ConvertTo-Json -Depth 5

              Write-Host "Triggering External Validation pipeline ($pipelineId) for version $(Build.BuildNumber)"
              Write-Host "Request body: $body"

              $runUrl = "https://dev.azure.com/$org/$project/_apis/pipelines/$pipelineId/runs?api-version=$apiVersion"
              $response = Invoke-RestMethod -Uri $runUrl -Method Post -Headers $headers -Body $body
              $runId = $response.id
              $webUrl = $response._links.web.href

              Write-Host "Pipeline run started: $webUrl (run ID: $runId)"

              # Poll for completion
              $statusUrl = "https://dev.azure.com/$org/$project/_apis/pipelines/$pipelineId/runs/${runId}?api-version=$apiVersion"
              $pollInterval = 30
              while ($true) {
                Start-Sleep -Seconds $pollInterval
                $status = Invoke-RestMethod -Uri $statusUrl -Method Get -Headers $headers
                $state = $status.state
                $result = $status.result

                Write-Host "$(Get-Date -Format 'HH:mm:ss') - State: $state, Result: $result"

                if ($state -eq "completed") {
                  if ($result -eq "succeeded") {
                    Write-Host "External Validation succeeded!"
                    exit 0
                  } else {
                    Write-Host "##[error]External Validation failed with result: $result"
                    Write-Host "##[error]See: $webUrl"
                    exit 1
                  }
                }
              }
          env:
            BUILDXL_PIPELINES_PAT: $(BuildXLPipelinesAccessToken)

    - stage: Mac
      displayName: Mac
      dependsOn: prepare
      jobs:
      - template: .azdo/rolling/jobs/mac.yml@self
    
    - stage: publish
      displayName: Publish
      variables:
      - group: "BuildXL GitHub Secrets"
      dependsOn: [CB, RCIT, TriggerExternal, Linux, Mac]
      condition: and(succeeded(), eq(${{ parameters.triggerReleasePipeline }}, true), eq(variables.isPublishingBranch, true))
      jobs:
      - template: .azdo/rolling/jobs/publish.yml@self
