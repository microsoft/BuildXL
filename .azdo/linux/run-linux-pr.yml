trigger: none  # Explicitly scheduled for PRs

# Single Linux PR validation pipeline that bootstraps the engine once on Ubuntu 22.04
# and fans out validation stages across all supported distros in parallel.

variables:
- template: /.azdo/common/component-detection-exclusions.yml

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Unofficial.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: BuildXL-DevOpsAgents-Selfhost-BuildCache
      image: ubuntu-22.04-PME-GPT
      os: linux
    sdl:
      sourceAnalysisPool:
        name: Windows-SDL-Agents
        os: windows
      policheck:
        enabled: true

    stages:
    # Bootstrap once on Ubuntu 22.04, then fan out validations across all distros.
    - template: /.azdo/linux/stages/stage-bootstrap.yml@self

    - template: /.azdo/linux/linux-stages-template.yml
      parameters:
        bootstrap: false
        suffix: _Ubuntu2204
        displayPrefix: '[Ub22.04] '
        pool:
          name: BuildXL-DevOpsAgents-Selfhost-BuildCache
          image: ubuntu-22.04-PME-GPT
          os: linux
        # Keep using interpose for Ubuntu 22.04 as test coverage until we can retire the interpose sandbox.
        BxlExtraArgs: /p:BUILDXL_FINGERPRINT_SALT=Ubuntu2204 /enableLinuxEBPFSandbox-

    - template: /.azdo/linux/linux-stages-template.yml
      parameters:
        bootstrap: false
        suffix: _Ubuntu2404
        displayPrefix: '[Ub24.04] '
        pool:
          name: BuildXL-DevOpsAgents-Selfhost-BuildCache
          image: ubuntu-24.04-PME-GPT
          os: linux
        BxlExtraArgs: /p:BUILDXL_FINGERPRINT_SALT=Ubuntu2404

    - template: /.azdo/linux/linux-stages-template.yml
      parameters:
        bootstrap: false
        suffix: _AzureLinux3
        displayPrefix: '[AzLi3] '
        pool:
          name: BuildXL-DevOpsAgents-Selfhost-BuildCache
          image: 1es-pt-azurelinux3-v2
          os: linux
        BxlExtraArgs: /p:BUILDXL_FINGERPRINT_SALT=AzureLinux3
