parameters:
- name: BxlCommonArgs # We reuse these across jobs like a constant
  type: string

- name: pool
  type: object

- name: sdkVersion
  type: string
  default: '9.x'

# Pre-build steps, including downloading BuildXL if needed
- name: preBuildSteps
  type: stepList
  default: []

jobs:
- template: job-build-selfhost-base.yml
  parameters:
    validationName: InternalRelease
    internal: true
    publishTestResults: true
    pool: ${{ parameters.pool }}
    sdkVersion: ${{ parameters.sdkVersion }}
    distribution:
      enabled: true
      workerCount: 1
    # TODO: Move the logToKustoIngestUri to a common location once the feature becomes part of the LKG
    buildXLArguments: >-
      --use-dev
      /q:ReleaseLinux
      "/logToKustoIngestUri:https://buildxl.eastus2.kusto.windows.net/BuildXLProd?clientId=1fbd9009-2b6d-4363-9e4c-c4f677961c92&tenantId=72f988bf-86f1-41af-91ab-2d7cd011db47&serviceConnectionId=861f8f3b-77a2-497a-a955-fbd921dc48de"
      ${{ parameters.BxlCommonArgs }}
      "/f:tag='test'"
    
    preBuildSteps:
    # Get bootstrap
    - task: DownloadPipelineArtifact@2
      displayName: 'Download bootstrap'
      inputs:
        artifactName: Dev
        # Use the path that --deploy-dev would use, because we --use-dev in the validation
        targetPath: "$(Build.SourcesDirectory)/Out/Selfhost/Dev"

    - ${{ each step in parameters.preBuildSteps }}:
      - ${{ step }}
