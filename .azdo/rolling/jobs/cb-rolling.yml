parameters:
- name: jobName
  type: string
- name: displayName
  type: string
- name: arguments
  type: object
  default: {}
- name: dependsOn
  type: object
  default: []
- name: condition
  type: string
  default: ''
- name: continueOnError
  type: boolean
  default: false

jobs:
- job: ${{ parameters.jobName }}
  displayName: ${{ parameters.displayName }}
  timeoutInMinutes: 180
  dependsOn: ${{ parameters.dependsOn }}
  continueOnError: ${{ parameters.continueOnError }}
  variables:
  # Pass directory exclusions to CloudBuild's Component Governance integration.
  # This must currently be set here as a pipeline variable rather than in the
  # build queue config because of a bug in CloudBuild's Coordinator where
  # ApplyPipelineTemplateOverrides unconditionally stomps queue-level CG
  # settings with empty defaults from the 1ES Pipeline Template.
  # CODESYNC: .azdo/common/component-detection-exclusions.yml (native ADO CG exclusions)
  - name: CG_DirectoryExclusionList
    value: '["**\\Out\\frontend\\Download**","**\\Out\\NodeJsForUnitTests**"]'
  ${{ if parameters.condition }}:
    condition: ${{ parameters.condition }}
  templateContext:
    type: cloudBuildJob
    arguments:
      description: ${{ parameters.displayName }}
      connectedServiceName: 2aef3ce3-3585-4f28-94a9-9b6cf2ff8dfe # CloudBuild Prod
      buildQueue: BuildXL_Internal_Rolling
      sendEmail: false
      ${{ insert }}: ${{ parameters.arguments }}
  # The CB task itself is agentless: this pool is used for SDL baselining
  pool:
    name: Windows-SDL-Agents
    os: windows
  